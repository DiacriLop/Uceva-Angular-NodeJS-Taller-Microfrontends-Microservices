@switch(state){

    @case('loading'){
        <app-alert alertState="loading" text="Cargando Salas..." ></app-alert>
    }

    @case('error'){
        <app-alert alertState="error" text="Error al Cargar las Salas" ></app-alert>
    }

    @case('success'){
        <app-theaters-table [theaters]="theaters" ></app-theaters-table>
    }

}
